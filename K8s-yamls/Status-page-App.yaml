apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page
  namespace: status-page
spec:
  replicas: 2
  selector:
    matchLabels:
      app: status-page
  template:
    metadata:
      labels:
        app: status-page
    spec:
      containers:
      - name: status-page
        image: yourdockerhub/status-page:latest
        env:
        - name: DATABASE_URL
          value: "postgres://statuspage:<your-secure-password>@postgres:5432/statuspage"
        - name: REDIS_URL
          value: "redis://redis:6379"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: status-page
  namespace: status-page
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: https
      port: 443
      targetPort: 8000
  selector:
    app: status-page
