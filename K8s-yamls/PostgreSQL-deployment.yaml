apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: status-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:latest
        env:
        - name: POSTGRES_DB
          value: statuspage
        - name: POSTGRES_USER
          value: statuspage
        - name: POSTGRES_PASSWORD
          value: <your-secure-password>
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: status-page
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres
