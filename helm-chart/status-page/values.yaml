# Values for status-page Helm chart

replicaCount: 2

image:
  repository: 992382545251.dkr.ecr.us-east-1.amazonaws.com/adam-ecr-repo
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
#  - name: aws-ecr-credentials

nameOverride: "status-page"
fullnameOverride: "status-page-deployment"

serviceAccount:
  create: true
  name: "status-page-service-account"
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::992382545251:role/adams-status-page-role
service:
  type: LoadBalancer
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: "status-page.adamlevs.com"
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: "status-page-tls"
      hosts:
        - "status-page.adamlevs.com"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# RDS and Redis Configuration
database:
  endpoint: "terraform-20241103150345546600000001.cx248m4we6k7.us-east-1.rds.amazonaws.com"
  username: "statuspage"
  password: "Qz147369"
  dbName: "statuspage"

redis:
  host: "adam-redis-cluster.7fftml.0001.use1.cache.amazonaws.com"
  port: "6379"

